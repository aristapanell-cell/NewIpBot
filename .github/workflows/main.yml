name: AristaIP Extractor

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  extract-ips:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: |
          pip install requests beautifulsoup4

      - name: Create token file
        run: |
          sed -i "s/YOUR_BOT_TOKEN_HERE/${{ secrets.PROXY_BOT_TOKEN }}/g" main.py

      - run: python main.py
        env:
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
