name: AristaIP Extractor

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  extract-ips:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore history
        run: |
          git fetch origin cache:cache 2>/dev/null || true
          if git show-ref --verify --quiet refs/heads/cache; then
            git checkout cache -- sent_ips.json 2>/dev/null || echo "{}" > sent_ips.json
          else
            echo "{}" > sent_ips.json
          fi
          if [ ! -f sent_ips.json ]; then
            echo "{}" > sent_ips.json
          fi
          cp sent_ips.json sent_ips.json.backup 2>/dev/null || true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run extractor
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}

      - name: Save history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git show-ref --verify --quiet refs/heads/cache; then
            git checkout cache
          else
            git checkout --orphan cache
          fi
          
          if [ -f "$GITHUB_WORKSPACE/sent_ips.json" ]; then
            cp "$GITHUB_WORKSPACE/sent_ips.json" .
          else
            echo "{}" > sent_ips.json
          fi
          
          git add sent_ips.json
          git commit -m "Update history $(date +%s)" || echo "No changes"
          git push origin cache --force
          git checkout main
