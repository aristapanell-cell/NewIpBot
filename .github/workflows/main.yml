name: AristaIP Extractor

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  extract-ips:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore sent history
        run: |
          mkdir -p "$GITHUB_WORKSPACE"
          git fetch origin cache:cache 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/cache; then
            git show origin/cache:sent_ips.json > sent_ips.json 2>/dev/null || echo "{}" > sent_ips.json
          else
            echo "{}" > sent_ips.json
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: |
          python -m pip install --upgrade pip
          pip install requests

      - run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}

      - name: Save sent history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout --orphan cache 2>/dev/null || git checkout cache
          git rm -rf . >/dev/null 2>&1 || true
          
          if [ -f "$GITHUB_WORKSPACE/sent_ips.json" ]; then
            cp "$GITHUB_WORKSPACE/sent_ips.json" .
          else
            echo "{}" > sent_ips.json
          fi
          
          git add sent_ips.json
          git commit -m "update sent history $(date +%s)" || echo "No changes to commit"
          git push origin cache --force
